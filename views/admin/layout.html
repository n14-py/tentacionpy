<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administrador - TentacionPY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="sidebar">
    <div>
        <div class="sidebar-header">
            Admin TPY
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a href="/admin/dashboard" class="nav-link <%= path.includes('/admin/dashboard') ? 'active' : '' %>">
                    <i class="fa-solid fa-tachometer-alt fa-fw"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin/users" class="nav-link <%= path.includes('/admin/users') || path.includes('/admin/user') ? 'active' : '' %>">
                    <i class="fa-solid fa-users fa-fw"></i>
                    Usuarios
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin/posts" class="nav-link <%= path.includes('/admin/posts') ? 'active' : '' %>">
                    <i class="fa-solid fa-file-alt fa-fw"></i>
                    Anuncios
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin/withdrawals" class="nav-link <%= path.includes('/admin/withdrawals') ? 'active' : '' %>">
                    <i class="fa-solid fa-money-bill-wave fa-fw"></i>
                    Retiros
                </a>
            </li>
        </ul>
    </div>
    <div class="sidebar-footer">
         <a href="/feed" class="nav-link">
            <i class="fa-solid fa-arrow-left fa-fw"></i>
            Volver al Sitio
        </a>
    </div>
</div>

<main class="main-content">
    <%- body %>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
