<%- include('partials/header.html') %>

<div class="container">
    <div class="purchase-success-container form-container">
        <div class="icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>¡Compra Exitosa!</h1>
        <p>Has desbloqueado un nuevo video. ¡Disfrútalo!</p>
        
        <% if (post.files && post.files.length > 0) { %>
            <video src="<%= post.files[0] %>" class="video-thumbnail" muted></video>
        <% } %>

        <div class="actions">
            <a href="/post/<%= post._id %>" class="btn btn-primary">Ver Video Ahora</a>
            <a href="/feed" class="btn btn-secondary">Seguir Explorando</a>
        </div>
    </div>
</div>

<%- include('partials/footer.html') %>
