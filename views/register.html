<%- include('partials/header.html') %>

<div class="form-container" style="max-width: 550px; margin: 2rem auto;">
    <h2>Crea tu Cuenta Gratis</h2>
    <p>Únete a la comunidad más caliente de Paraguay.</p>

    <% if (error) { %>
        <div class="error-message"><%= error %></div>
    <% } %>

    <form action="/register" method="POST">
        <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <div class="form-group" style="flex: 1;">
                <label for="gender">Me identifico como</label>
                <select id="gender" name="gender" required>
                    <option value="Mujer">Mujer</option>
                    <option value="Hombre">Hombre</option>
                    <option value="Trans">Trans</option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="orientation">Me interesan</label>
                <select id="orientation" name="orientation" required>
                    <option value="Heterosexual">Heterosexuales</option>
                    <option value="Homosexual">Homosexuales</option>
                    <option value="Bisexual">Bisexuales</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="location">Ubicación Principal</label>
            <select id="location" name="location" required>
                <% CITIES.forEach(city => { %>
                    <option value="<%= city %>"><%= city %></option>
                <% }) %>
            </select>
        </div>
        <div class="form-group form-group-checkbox">
            <input type="checkbox" id="ageCheck" name="ageCheck" required>
            <label for="ageCheck">Confirmo que tengo 18 años o más y acepto los <a href="/terms" target="_blank">Términos y Condiciones</a>.</label>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarme</button>
    </form>
    <hr>
     <a href="/auth/google" class="btn btn-secondary" style="width: 100%; background: #fff; color: #121212; border-color: #ccc;">
        <img src="/img/google-logo.png" alt="Google" style="width: 20px; height: 20px; margin-right: 10px;">
        Registrarse con Google
    </a>
    <p style="text-align: center; margin-top: 2rem;">¿Ya tienes una cuenta? <a href="/login">Inicia Sesión</a></p>
</div>

<%- include('partials/footer.html') %>
