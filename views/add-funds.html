<%- include('partials/header.html') %>

<div class="page-header">
    <h1>Añadir Fondos a tu Billetera</h1>
    <a href="/profile" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
</div>

<div class="form-container">
    <h2>Tu Saldo Actual: <span style="color: var(--accent-color)"><%= currentUser.tpysBalance %> TPYS</span></h2>
    <p>Simula una recarga de TPYS para poder comprar contenido en la plataforma.</p>
    
    <% if (success) { %>
        <div class="success-message"><%= success %></div>
    <% } %>

    <form action="/add-funds" method="POST">
        <div class="form-group">
            <label for="amount">Cantidad de TPYS a añadir</label>
            <input type="number" id="amount" name="amount" required min="100" step="10" placeholder="Ej: 500">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Añadir TPYS</button>
    </form>
</div>

<%- include('partials/footer.html') %>
