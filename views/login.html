<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TentacionPY</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

<%- include('partials/header.html') %>

<main class="container">
    <div class="form-container auth-form">
        <h2>Iniciar Sesión</h2>
        <p>Ingresa a tu cuenta para continuar.</p>
        
        <% if (locals.error) { %>
            <div class="alert alert-danger"><%= error %></div>
        <% } %>

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
            </div>
        </form>
        <hr>
        <div class="social-login">
            <a href="/auth/google" class="btn btn-block btn-danger">
                <i class="fab fa-google"></i> Continuar con Google
            </a>
        </div>
        <p class="text-center mt-3">¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
    </div>
</main>

<%- include('partials/footer.html') %>

</body>
</html>
