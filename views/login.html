<%- include('partials/header.html') %>

<div class="form-container" style="max-width: 450px; margin: 4rem auto;">
    <h2>Iniciar Sesión</h2>
    
    <% if (error) { %>
        <div class="error-message"><%= error %></div>
    <% } %>
    
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Ingresar</button>
    </form>
    
    <hr>
    
    <a href="/auth/google" class="btn btn-secondary" style="width: 100%; background: #fff; color: #121212; border-color: #ccc;">
        <img src="/img/google-logo.png" alt="Google" style="width: 20px; height: 20px; margin-right: 10px;">
        Continuar con Google
    </a>
    
    <p style="text-align: center; margin-top: 2rem;">¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
</div>

<%- include('partials/footer.html') %>
