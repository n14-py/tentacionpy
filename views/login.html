<%- include('partials/header.html') %>

<div class="form-container">
    <h1>Iniciar Sesión</h1>
    <% if (error) { %>
        <div class="error-message"><%= error %></div>
    <% } %>

    <a href="/auth/google" class="btn btn-secondary" style="width: 100%; background-color: #4285F4; color: white; border: none;">
        <i class="fab fa-google"></i> Continuar con Google
    </a>

    <div style="text-align: center; margin: 1rem 0; color: var(--light-gray);">O</div>

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">¿No tienes una cuenta? <a href="/register">Regístrate aquí</a>.</p>
</div>

<%- include('partials/footer.html') %>
